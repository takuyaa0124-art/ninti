<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ビジョントレーニングゲーム｜反応力測定</title>

<style>
body{
    font-family:sans-serif;
    text-align:center;
    background:#f4f7fb;
    margin:0;
}

h1{
    margin-top:20px;
}

#gameArea{
    position:relative;
    width:90vw;
    max-width:800px;
    height:500px;
    margin:20px auto;
    background:white;
    border-radius:20px;
    box-shadow:0 6px 20px rgba(0,0,0,0.1);
    overflow:hidden;
}

.target{
    position:absolute;
    width:60px;
    height:60px;
    border-radius:50%;
    cursor:pointer;
}

.red{background:#ff4d4d;}
.blue{background:#4d79ff;}

#info{
    font-size:18px;
    margin-top:10px;
}

#result{
    margin-top:15px;
    font-size:20px;
    font-weight:bold;
}

.stats{
    margin-top:10px;
    font-size:16px;
}

button{
    padding:12px 25px;
    border:none;
    border-radius:10px;
    background:#4CAF50;
    color:white;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

.notice{
    font-size:13px;
    margin:20px;
    color:#555;
}
</style>
</head>
<body>

<h1>ビジョントレーニングゲーム</h1>
<p>🔵 青だけをタップしてください（赤は触らない）</p>

<div id="gameArea"></div>

<div id="info">
    スコア: <span id="score">0</span> |
    残り時間: <span id="time">30</span>秒
</div>

<button onclick="startGame()">スタート</button>

<div id="result"></div>

<div class="stats">
    最高スコア: <span id="highScore">0</span> |
    平均スコア: <span id="avgScore">0</span>
</div>

<p class="notice">
※本コンテンツは視覚反応や注意力を刺激する目的のゲームです。医療効果を保証するものではありません。
</p>

<script>
let score = 0;
let timeLeft = 30;
let gameInterval;
let timerInterval;
let scores = JSON.parse(localStorage.getItem("visionScores")) || [];

updateStats();

function startGame(){
    score = 0;
    timeLeft = 30;
    document.getElementById("score").textContent = score;
    document.getElementById("time").textContent = timeLeft;
    document.getElementById("result").textContent = "";
    document.getElementById("gameArea").innerHTML = "";

    gameInterval = setInterval(createTarget, 700);
    timerInterval = setInterval(updateTimer, 1000);
}

function createTarget(){
    const gameArea = document.getElementById("gameArea");
    const target = document.createElement("div");
    target.classList.add("target");

    const isBlue = Math.random() > 0.5;
    target.classList.add(isBlue ? "blue" : "red");

    const x = Math.random() * (gameArea.clientWidth - 60);
    const y = Math.random() * (gameArea.clientHeight - 60);

    target.style.left = x + "px";
    target.style.top = y + "px";

    target.onclick = function(){
        if(isBlue){
            score++;
        } else {
            score--;
        }
        document.getElementById("score").textContent = score;
        gameArea.removeChild(target);
    };

    gameArea.appendChild(target);

    setTimeout(()=>{
        if(gameArea.contains(target)){
            gameArea.removeChild(target);
        }
    },700);
}

function updateTimer(){
    timeLeft--;
    document.getElementById("time").textContent = timeLeft;

    if(timeLeft <= 0){
        clearInterval(gameInterval);
        clearInterval(timerInterval);
        endGame();
    }
}

function endGame(){
    scores.push(score);
    localStorage.setItem("visionScores", JSON.stringify(scores));
    updateStats();

    let evaluation = "";

    if(score >= 25){
        evaluation = "素晴らしい！反応力が非常に高いです！";
    }else if(score >= 15){
        evaluation = "とても良いです！安定した反応力です。";
    }else if(score >= 5){
        evaluation = "平均的です。継続すると向上が期待できます。";
    }else{
        evaluation = "少し低めです。ゆっくり継続してみましょう。";
    }

    document.getElementById("result").textContent =
        "今回のスコア: " + score + "点 ｜ " + evaluation;
}

function updateStats(){
    if(scores.length === 0) return;

    let high = Math.max(...scores);
    let avg = scores.reduce((a,b)=>a+b,0) / scores.length;

    document.getElementById("highScore").textContent = high;
    document.getElementById("avgScore").textContent = avg.toFixed(1);
}
</script>

</body>
</html>
